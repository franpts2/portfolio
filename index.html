<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="/logo-1.png" type="image/png" />
		<title>Francisca Portugal</title>

		<!-- preload critical fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap"
		/>
		<link
			rel="preload"
			as="style"
			href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap"
		/>

		<!-- load fonts asynchronously -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap"
			media="print"
			onload="this.media = 'all'"
		/>
		<link
			rel="stylesheet"
			href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap"
			/>
			<link
				rel="stylesheet"
				href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap"
			/>
		</noscript>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
