<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="/logo-light.svg" type="image/png" />
		<title>Francisca Portugal</title>

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://franciscapt.dev/" />
        <meta property="og:title" content="Francisca Portugal" />
        <meta property="og:description" content="Frontend Developer" />
        <meta property="og:image" content="/og-image.png" />

        <!-- Twitter / X -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://franciscapt.dev/" />
        <meta property="twitter:title" content="Francisca Portugal" />
        <meta property="twitter:description" content="Frontend Developer" />
        <meta property="twitter:image" content="/og-image.png" />

        <!-- Additional SEO -->
        <meta name="description" content="Frontend Developer" />

		<!-- Critical resource hints: establish connections early -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
		<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

		<!-- Preload critical fonts for faster rendering -->
		<link rel="preload" as="image" href="/night-colored-me.png" />
		<link rel="preload" as="image" href="/sand-colored-me.png" />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap"
		/>
		<link
			rel="preload"
			as="style"
			href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap"
		/>

		<!-- Load fonts asynchronously to avoid render blocking -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap"
			media="print"
			onload="this.media = 'all'"
		/>
		<link
			rel="stylesheet"
			href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap"
			/>
			<link
				rel="stylesheet"
				href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap"
			/>
		</noscript>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
